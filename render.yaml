services:
  - type: web
    name: chess-arena
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: chess-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
